name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/shared/package-lock.json
            apps/api/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install shared package dependencies
        run: npm ci --prefix packages/shared

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      # apps/api の typecheck/build/test は @prisma/client の生成物に依存するため、
      # typecheck より前に prisma generate を走らせる必要がある。
      - name: Generate Prisma client
        run: npm run db:generate

      # apps/api の tsconfig は @pmtp/shared を packages/shared/dist/index に解決する
      # （src 直指定は rootDir 違反 / Stage2 基盤エージェント判断）。CI では shared dist が
      # 未生成のため、typecheck より前に packages/shared を build する必要がある。
      - name: Build shared package
        run: npm --prefix packages/shared run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build