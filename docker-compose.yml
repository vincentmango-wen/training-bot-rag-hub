name: training-bot-rag-hub

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pmtp-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_hub}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password_local_only}
      TZ: ${TZ:-Asia/Tokyo}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - rag_local

volumes:
  rag_postgres_data:

networks:
  rag_local:
    driver: bridge
